<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infografis Biologi - Home (Photo Background)</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Reset Dasar */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f7fafc; /* Latar belakang abu-abu sangat muda */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Frame Mobile */
        .phone-frame {
            width: 375px; /* Lebar standar iPhone SE/8 */
            height: 667px; /* Tinggi standar */
            
            /* --- PENGGUNAAN FOTO BACKGROUND --- */
            background-image: url('../assets/Pencemaran\ lingkungan.png'); /* <--- NAMA FILE FOTO ANDA */
            background-size: cover; /* Foto memenuhi frame */
            background-position: center; /* Foto berpusat */
            
            border-radius: 40px; /* Sudut membulat */
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); /* Bayangan lembut */
            position: relative;
            overflow: hidden; /* Sembunyikan konten berlebih */
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Pisahkan header, tengah, bawah */
            padding: 60px 25px; /* Padding dalam */
        }

        /* Overlay Gradien Hijau (Agar teks terbaca & estetis) */
        

        /* Konten Utama */
        .content {
            position: relative;
            z-index: 10; /* Layer konten di atas overlay */
            text-align: center;
            color: white; /* Warna teks default putih agar kontras */
        }

        /* Area Judul */
        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            color: #1a531e; /* Hijau tua */
            font-size: 20px;
            font-weight: 700;
            line-height: 1.3;
        }

        /* Teks Judul di atas Foto (Warna disesuaikan agar terbaca) */
        .header-on-photo h1 {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3); /* Bayangan teks agar terbaca */
            margin-bottom: 10px;
        }

        .header-on-photo p {
            font-size: 14px;
            font-weight: 300;
            opacity: 0.9;
        }

        /* Area Bumi dan Daun */
        .earth-container {
            margin-bottom: 30px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .earth-image {
            width: 200px; /* Atur ukuran gambar Bumi */
            z-index: 10;
        }

        /* Daun Hias di Sekitar Bumi */
        .leaf {
            position: absolute;
            width: 30px; /* Ukuran daun */
            opacity: 0.7;
            z-index: 5;
        }

        /* Atur Posisi Daun Secara Manual agar Menyerupai Gambar */
        .leaf-1 { bottom: -20px; left: -30px; transform: rotate(-15deg); }
        .leaf-2 { bottom: 0; left: 10px; transform: rotate(-30deg); }
        .leaf-3 { bottom: -15px; right: -25px; transform: rotate(15deg); }
        .leaf-4 { bottom: 5px; right: 15px; transform: rotate(30deg); }

        /* Tombol 'MULAI' */
        .mulai-btn {
             background: linear-gradient(180deg, #3d8c43 0%, #2e6b33 100%);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(46, 107, 51, 0.3);
        }

        .mulai-btn:hover {
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
        }

        .mulai-btn:active {
            transform: scale(0.97); /* Sedikit menyusut saat diklik */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.15);
        }

        /* Tombol Mulai dengan Efek Glassmorphism (Kaca) */
        .glass-btn {
            position: relative;
            z-index: 10;
             background: linear-gradient(180deg, #3d8c43 0%, #2e6b33 100%);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(46, 107, 51, 0.3);
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px); /* Sedikit naik saat hover */
        }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="overlay"></div>

    

    <div class="hero-image-container content" id="heroContainer">
        <img src="../assets/earth.png" alt="Bumi Bersih" class="earth-image" id="heroImg">
    </div>

    <div style="text-align: center; z-index: 10;" id="buttonContainer">
        <a href="isi.html" class="glass-btn">MULAI</a>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
<script>
    // --- ANIMASI MASUK (FADE-IN UP) ---
    anime.timeline({
        easing: 'easeOutExpo'
    })
    .add({
        targets: '#headerText h1, #headerText p',
        translateY: [40, 0],
        opacity: [0, 1],
        duration: 1000,
        delay: 200
    })
    .add({
        targets: '#heroContainer',
        scale: [0.6, 1],
        opacity: [0, 1],
        duration: 1200
    }, '-=600')
    .add({
        targets: '#buttonContainer',
        translateY: [30, 0],
        opacity: [0, 1],
        duration: 800
    }, '-=800');

    // --- ANIMASI FLOATING LEMBUT UNTUK BUMI ---
    anime({
        targets: '#heroImg',
        translateY: [-10, 10],
        duration: 2500,
        direction: 'alternate',
        loop: true,
        easing: 'easeInOutQuad'
    });

    
</script>

</body>
</html>
